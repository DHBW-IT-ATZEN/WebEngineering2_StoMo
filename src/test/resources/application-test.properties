# Test profile: in-memory H2 (MySQL compatibility mode) so the suite runs without Docker/MySQL.
# Activated via @ActiveProfiles("test"); layered on top of the main application.properties.
spring.datasource.url=jdbc:h2:mem:stomo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Dummy third-party keys so nothing reaches a real API during tests.
api.key.alphavantage=test
api.key.finnhub=test
api.key.yoda=

# Deterministic JWT secret for token round-trip tests (>= 32 chars for HS256).
app.jwt.secret=test-secret-0123456789-abcdefghij-klmnop
app.jwt.ttl-minutes=120
