spring.application.name=StoMo
# Empty defaults so the app boots on a fresh clone without a .env. Without a key the
# corresponding live-data feature stays dormant (the call fails and is handled gracefully).
api.key.alphavantage=${ALPHAVANTAGE_API_KEY:}
api.key.finnhub=${FINNHUB_API_KEY:}
api.url.alphavantage=https://www.alphavantage.co/query
api.url.finnhub=https://finnhub.io/api/v1
api.url.yahoo=https://query1.finance.yahoo.com
api.url.yoda=https://yodish.p.rapidapi.com
api.host.yoda=yodish.p.rapidapi.com
# Drop your RapidAPI yodish key into .env as YODA_API_KEY. Empty = feature stays dormant (text passes through untranslated).
api.key.yoda=${YODA_API_KEY:}

# MySQL Verbindung
spring.datasource.url=jdbc:mysql://localhost:3306/stomo_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=stomo_user
spring.datasource.password=stomo_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Wie lange die gecachte 30-Min-Historie als "frisch" gilt (Minuten). Daten sind ohnehin verzögert -> selten aktualisieren reicht.
cache.history.ttl-minutes=720

# JWT: HS256 secret must be >= 32 chars (256 bit). Override JWT_SECRET in .env for anything real.
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-please-0123456789-abcdefghij}
app.jwt.ttl-minutes=120

# Security: lock an account after N consecutive failed logins, for this many minutes.
app.security.max-login-attempts=5
app.security.lockout-minutes=15

# Homepage ticker banner: switch from the curated default set to the top-20 most-watched
# symbols once users have collectively watched more than this many distinct symbols.
app.banner.dynamic-threshold=20
app.banner.ttl-minutes=5

# Actuator: expose only the health endpoint (used by the container healthcheck); hide details.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Hibernate Einstellungen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect wird von Hibernate automatisch erkannt (Hibernate 7 kennt MySQL8Dialect nicht mehr)
