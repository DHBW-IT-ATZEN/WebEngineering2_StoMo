services:
  # PostgreSQL database
  db:
    image: postgres:16
    container_name: stomo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: stomo_db
      POSTGRES_USER: stomo_user
      POSTGRES_PASSWORD: stomo_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stomo_user -d stomo_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Spring Boot backend
  backend:
    build: .
    container_name: stomo-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env                            # ALPHAVANTAGE_API_KEY / FINNHUB_API_KEY / YODA_API_KEY / JWT_SECRET
    environment:
      # Production profile: the app refuses to boot with the built-in dev JWT secret,
      # so a strong JWT_SECRET must be supplied via .env.
      - SPRING_PROFILES_ACTIVE=prod
      # Override the localhost DB URL from application.properties — use the compose-network "db" host.
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/stomo_db
      - SPRING_DATASOURCE_USERNAME=stomo_user
      - SPRING_DATASOURCE_PASSWORD=stomo_password
    depends_on:
      db:
        condition: service_healthy     # wait until Postgres is accepting connections
    # The image's HEALTHCHECK (Actuator /actuator/health) drives this service's health status.

  # Static frontend (Vite build) served by nginx, with /api proxied to the backend container
  frontend:
    build: ./frontend
    container_name: stomo-frontend
    restart: unless-stopped
    ports:
      - "80:80"                          # http://localhost  /  http://stomo.lab (with a hosts entry)
    depends_on:
      backend:
        condition: service_healthy     # wait until the backend reports healthy

volumes:
  pgdata:
