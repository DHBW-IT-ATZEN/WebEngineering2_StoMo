services:
  # MySQL database
  db:
    image: mysql:8.0
    container_name: stomo-mysql
    restart: always
    environment:
      MYSQL_DATABASE: stomo_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: stomo_user
      MYSQL_PASSWORD: stomo_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Spring Boot backend
  backend:
    build: .
    container_name: stomo-backend
    ports:
      - "8080:8080"
    env_file:
      - .env                            # ALPHAVANTAGE_API_KEY / FINNHUB_API_KEY / YODA_API_KEY / JWT_SECRET
    environment:
      # Production profile: the app refuses to boot with the built-in dev JWT secret,
      # so a strong JWT_SECRET must be supplied via .env.
      - SPRING_PROFILES_ACTIVE=prod
      # Override the localhost DB URL from application.properties — use the compose-network "db" host.
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/stomo_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=stomo_user
      - SPRING_DATASOURCE_PASSWORD=stomo_password
    depends_on:
      - db

  # Static frontend (Vite build) served by nginx, with /api proxied to the backend container
  frontend:
    build: ./frontend
    container_name: stomo-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
