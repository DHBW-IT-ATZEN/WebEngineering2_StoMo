services:
  # PostgreSQL database
  db:
    image: postgres:16
    container_name: stomo-postgres
    restart: unless-stopped
    environment:
      # Credentials are read from .env (auto-loaded by docker compose). The password is
      # required (`:?`) — compose refuses to start if POSTGRES_PASSWORD is unset/empty.
      POSTGRES_DB: ${POSTGRES_DB:-stomo_db}
      POSTGRES_USER: ${POSTGRES_USER:-stomo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is not set. Run 'cp .env.example .env' and set it (see docs/setup.md)}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ escapes compose interpolation so the value is read from the container's env at runtime.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Spring Boot backend
  backend:
    build: .
    container_name: stomo-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:                           # ALPHAVANTAGE_API_KEY / FINNHUB_API_KEY / YODA_API_KEY / JWT_SECRET
      - path: .env
        required: true
    environment:
      # Production profile: the app refuses to boot with the built-in dev JWT secret,
      # so a strong JWT_SECRET must be supplied via .env.
      - SPRING_PROFILES_ACTIVE=prod
      # Override the localhost DB URL from application.properties — use the compose-network "db" host.
      # Credentials come from .env; the password is required (compose fails if POSTGRES_PASSWORD is unset).
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-stomo_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-stomo_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is not set. Run 'cp .env.example .env' and set it (see docs/setup.md)}
      # Dynamic German translation via the self-hosted LibreTranslate service.
      - LIBRETRANSLATE_URL=http://libretranslate:5000
    depends_on:
      db:
        condition: service_healthy     # wait until Postgres is accepting connections
      # No hard dependency on libretranslate: the translation feature degrades gracefully
      # (text passes through), so an unavailable translator must never block the backend.
    # The image's HEALTHCHECK (Actuator /actuator/health) drives this service's health status.

  # Self-hosted machine translation (en -> de) for dynamic text. No API key required.
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: stomo-libretranslate
    restart: unless-stopped
    environment:
      - LT_LOAD_ONLY=en,de          # only load the English/German model -> faster startup, less RAM
      - LT_DISABLE_WEB_UI=true
    # No named volume: the image runs as non-root and can't write a root-owned volume mount.
    # The small en<->de model simply re-downloads if the container is recreated.
    healthcheck:
      # The image ships python but no curl; hit /languages to confirm the model is ready.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/languages').getcode()==200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s            # first boot downloads the en<->de model

  # Static frontend (Vite build) served by nginx, with /api proxied to the backend container
  frontend:
    build: ./frontend
    container_name: stomo-frontend
    restart: unless-stopped
    ports:
      - "80:80"                          # http://localhost  /  http://stomo.lab (with a hosts entry)
    depends_on:
      backend:
        condition: service_healthy     # wait until the backend reports healthy

volumes:
  pgdata:
