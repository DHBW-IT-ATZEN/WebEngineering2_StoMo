# TLS server config for https://stomo.dev. Mounted over the default config by
# docker-compose.https.yml, which also mounts the mkcert certificate at /etc/nginx/certs.

# HTTP :80 — answer the container healthcheck, redirect everything else to HTTPS.
server {
  listen 80;
  server_name stomo.dev localhost _;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://stomo.dev$request_uri;
  }
}

# HTTPS :443 — the app, served with the locally-trusted (mkcert) certificate.
server {
  listen 443 ssl;
  http2 on;
  server_name stomo.dev;

  ssl_certificate     /etc/nginx/certs/stomo.dev.pem;
  ssl_certificate_key /etc/nginx/certs/stomo.dev-key.pem;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/css application/javascript application/json image/svg+xml;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Vite emits content-hashed filenames under /assets, so they can be cached aggressively.
  location /assets/ {
    root /usr/share/nginx/html;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA: serve index.html for any non-asset path so client-side routing works.
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  # Forward /api/* to the backend container.
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
